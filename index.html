<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-API Data Fetcher by Heitor Dias Nascimento StudentID:78286</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>API Data Explorer</h1>
        <div class="controls">
            <button id="btn-countries">Fetch Countries</button>
            <button id="btn-users">Fetch Users</button>
            <button id="btn-rick">Fetch Rick & Morty</button>
        </div>

        <div class="filters">
            <select id="region-filter">
                <option value="europe">Europe</option>
                <option value="africa">Africa</option>
                <option value="americas">Americas</option>
                <option value="asia">Asia</option>
                <option value="oceania">Oceania</option>
            </select>

            <input type="text" id="rick-search" placeholder="Search Character Name...">
        </div>
    </header>

    <main id="data-grid" class="grid-container"></main>

    <script src="script.js"></script>
</body>
</html>
